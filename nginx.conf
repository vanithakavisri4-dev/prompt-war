server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://generativelanguage.googleapis.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.cloudfunctions.net https://*.run.app; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── Caching ───────────────────────────────────────────────
    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ~* \.(json|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/manifest+json image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    # ── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Robots-Tag "index, follow" always;
    }

    # ── Health Check Endpoint (Cloud Run) ─────────────────────
    location /healthz {
        access_log off;
        return 200 '{"status":"healthy","service":"arenaflow-ai","version":"2.0.0"}';
        add_header Content-Type application/json;
    }

    # ── Metrics Endpoint ──────────────────────────────────────
    location /metrics {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Block Sensitive Files ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|log|bak|sql|conf|ini)$ {
        deny all;
        return 404;
    }

    # ── Error Pages ───────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
